name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore EventHubConsumer
        run: dotnet restore EventHubConsumer/EventHubConsumer.csproj

      - name: Build EventHubConsumer
        run: dotnet build EventHubConsumer/EventHubConsumer.csproj --configuration Release --no-restore

      - name: Restore EventHubPublisher
        run: dotnet restore EventHubPublisher/EventHubPublisher.csproj

      - name: Build EventHubPublisher
        run: dotnet build EventHubPublisher/EventHubPublisher.csproj --configuration Release --no-restore
